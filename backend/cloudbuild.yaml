# Cloud Build config for FSU-1X backend.
# Triggered on push to main via Cloud Build GitHub trigger.
# Deploys to Cloud Run (source deploy — no Docker needed locally).

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - chimera-fsu-1x
      - --source=.
      - --region=europe-west2
      - --project=chimera-v4
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --set-secrets=ODDS_API_KEY=fsu1x-odds-api-key:latest,ADMIN_KEY=fsu1x-admin-key:latest
      - --set-env-vars=GCP_PROJECT=chimera-v4,ALLOWED_ORIGINS=["https://fsu-1x.pages.dev"]

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
